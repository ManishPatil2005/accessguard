name: Bug Report
description: Report a bug or issue
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the form below.
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the issue
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the bug
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  
  - type: textarea
    id: error
    attributes:
      label: Error Message
      description: Full error message or traceback
      placeholder: Paste error message here
      render: python
  
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true
  
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.13.0"
  
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional information
      placeholder: Add any other context here
  
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked existing issues
          required: true
        - label: I have provided all required information
          required: true
