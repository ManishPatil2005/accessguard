name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feature suggestion! Please provide details below.
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the feature
      placeholder: What feature would you like to see?
    validations:
      required: true
  
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature useful?
      placeholder: What problem does this solve?
    validations:
      required: true
  
  - type: textarea
    id: api
    attributes:
      label: Proposed Implementation
      description: How would this feature work?
      placeholder: Describe how users would use this feature
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      description: Any other ways to implement this?
      placeholder: Have you considered other solutions?
  
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked for existing feature requests
          required: true
        - label: This aligns with project scope
          required: false
