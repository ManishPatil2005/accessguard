{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<section class="glass-card form-card">
    <h2>Register</h2>
    <p class="subtitle">Create a new account for AccessGuard.</p>

    {% if message %}
    <div class="alert {{ message_type }}">{{ message }}</div>
    {% endif %}

    <form method="post" action="/register" class="stack-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="8" required />

        <label for="role">Role</label>
        <select id="role" name="role" required>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button class="btn btn-primary" type="submit">Register Securely</button>
    </form>
</section>
{% endblock %}
